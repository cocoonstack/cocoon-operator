version: 2

before:
  hooks:
    - go mod download

builds:
  - id: cocoon-operator-debug
    binary: cocoon-operator.dbg
    env:
      - CGO_ENABLED=0
    ldflags:
      - -X github.com/cocoonstack/cocoon-operator/version.REVISION={{.Commit}}
      - -X github.com/cocoonstack/cocoon-operator/version.VERSION={{.Env.VERSION}}
      - -X github.com/cocoonstack/cocoon-operator/version.BUILTAT={{.Date}}
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    main: .

  - id: cocoon-operator-linux
    binary: cocoon-operator
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s
      - -X github.com/cocoonstack/cocoon-operator/version.REVISION={{.Commit}}
      - -X github.com/cocoonstack/cocoon-operator/version.VERSION={{.Env.VERSION}}
      - -X github.com/cocoonstack/cocoon-operator/version.BUILTAT={{.Date}}
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    main: .

archives:
  - id: release
    builds:
      - cocoon-operator-linux
    name_template: >-
      {{- .ProjectName }}_{{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end -}}

  - id: debug
    builds:
      - cocoon-operator-debug
    name_template: >-
      {{- .ProjectName }}_{{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}_debug
      {{- if .Arm }}v{{ .Arm }}{{ end -}}

  # Unversioned alias so releases/latest/download/cocoon-operator_Linux_x86_64.tar.gz resolves.
  - id: release-latest
    builds:
      - cocoon-operator-linux
    name_template: >-
      {{- .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end -}}

checksum:
  name_template: 'checksums.txt'

release:
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
