---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cocoon-operator
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cocoon-operator
rules:
  # Hibernation CRD
  - apiGroups: ["cocoon.cis"]
    resources: ["hibernations"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["cocoon.cis"]
    resources: ["hibernations/status"]
    verbs: ["get", "patch", "update"]
  # CocoonSet CRD
  - apiGroups: ["cocoon.cis"]
    resources: ["cocoonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["cocoon.cis"]
    resources: ["cocoonsets/status"]
    verbs: ["get", "patch", "update"]
  # Pods — need create/delete for CocoonSet
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "patch", "create", "delete"]
  # ConfigMaps — read snapshot tracking
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cocoon-operator
subjects:
  - kind: ServiceAccount
    name: cocoon-operator
    namespace: kube-system
roleRef:
  kind: ClusterRole
  name: cocoon-operator
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cocoon-operator
  namespace: kube-system
  labels:
    app: cocoon-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cocoon-operator
  template:
    metadata:
      labels:
        app: cocoon-operator
    spec:
      serviceAccountName: cocoon-operator
      containers:
        - name: operator
          image: cocoon-operator:latest
          imagePullPolicy: IfNotPresent
          resources:
            limits:
              cpu: "100m"
              memory: "128Mi"
