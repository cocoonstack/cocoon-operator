apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: hibernations.cocoon.cis
spec:
  group: cocoon.cis
  names:
    kind: Hibernation
    listKind: HibernationList
    plural: hibernations
    singular: hibernation
    shortNames: [hib]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [podName]
              properties:
                podName:
                  type: string
                  description: Target pod name to hibernate or wake.
                action:
                  type: string
                  enum: [hibernate, wake]
                  default: hibernate
                  description: "hibernate: snapshot VM + suspend pod. wake: restore VM from snapshot."
            status:
              type: object
              properties:
                phase:
                  type: string
                  description: "Current phase: Pending, Hibernating, Hibernated, Waking, Active, Failed."
                snapshotRef:
                  type: string
                  description: Epoch snapshot reference (set after successful hibernate).
                vmName:
                  type: string
                  description: Stable VM name derived from pod.
                message:
                  type: string
                lastTransitionTime:
                  type: string
                  format: date-time
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Pod
          type: string
          jsonPath: .spec.podName
        - name: Action
          type: string
          jsonPath: .spec.action
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: VM
          type: string
          jsonPath: .status.vmName
          priority: 1
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
